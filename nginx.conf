limit_req_zone $binary_remote_addr zone=threads_limit:10m rate=90r/m;

server {
        root /var/www/html;

        index index.html index.htm index.nginx-debian.html;

        server_name giant-foxes-lead-noisily.st.a.dcdg.xyz www.giant-foxes-lead-noisily.st.a.dcdg.xyz;

        location /threads {
                limit_req zone=threads_limit;
                limit_req_status 429;

                proxy_pass http://localhost:5000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
                proxy_pass http://localhost:5000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
        }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/giant-foxes-lead-noisily.st.a.dcdg.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/giant-foxes-lead-noisily.st.a.dcdg.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Redirect HTTP ke HTTPS - managed by Certbot
server {
    if ($host = www.giant-foxes-lead-noisily.st.a.dcdg.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = giant-foxes-lead-noisily.st.a.dcdg.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

        listen 80 default_server;
        listen [::]:80 default_server;

        server_name giant-foxes-lead-noisily.st.a.dcdg.xyz www.giant-foxes-lead-noisily.st.a.dcdg.xyz;
    return 404; # managed by Certbot
}
