# Rate limiting zone: 90 request per menit per IP
limit_req_zone $binary_remote_addr zone=threads_limit:10m rate=90r/m;

server {
    listen 443 ssl;
    server_name giant-foxes-lead-noisily.st.a.dcdg.xyz www.giant-foxes-lead-noisily.st.a.dcdg.xyz;

    # SSL - managed by Certbot
    ssl_certificate /etc/letsencrypt/live/giant-foxes-lead-noisily.st.a.dcdg.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giant-foxes-lead-noisily.st.a.dcdg.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Rate limiting untuk /threads dan semua sub-path-nya
    location /threads {
        limit_req zone=threads_limit burst=90 nodelay;
        limit_req_status 429;

        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Semua route lainnya
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect HTTP ke HTTPS - managed by Certbot
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name giant-foxes-lead-noisily.st.a.dcdg.xyz www.giant-foxes-lead-noisily.st.a.dcdg.xyz;

    if ($host = www.giant-foxes-lead-noisily.st.a.dcdg.xyz) {
        return 301 https://$host$request_uri;
    }

    if ($host = giant-foxes-lead-noisily.st.a.dcdg.xyz) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
